<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>فيديو حصري</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #000;
      color: white;
      text-align: center;
    }

    .box {
      max-width: 700px;
      margin: 60px auto;
      padding: 20px;
    }

    .card {
      background: #1c1c1c;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
    }

    h1 {
      color: #00ffcc;
    }

    button {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      background: #00ffcc;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 15px;
    }

    button:hover {
      background: #00c9aa;
    }

    iframe {
      width: 100%;
      height: 360px;
      border-radius: 10px;
      margin-top: 15px;
    }

    #videoSection {
      display: none;
    }

    .note {
      color: #aaa;
      font-size: 14px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="box">

  <!-- LANDING -->
  <div id="landing" class="card">
    <h1>🔥 فيديو صادم لا يفوتك</h1>
    <p>شاهد أداء لن تتوقعه 😱</p>
    <button onclick="showVideo()">▶ مشاهدة الفيديو</button>
  </div>

  <!-- VIDEO -->
  <div id="videoSection" class="card">
    <h2>🎬 الفيديو</h2>

    <iframe src="https://drive.google.com/file/d/1CCb7INUCI46PWIZ0NlOQdnnthrE69O2J/preview"></iframe>

    <p class="note">⚠️ سيتم فتح الفيديو بعد خطوة بسيطة</p>
  </div>

</div>

<!-- OGAds Locker -->
<script type="text/javascript">
  var _ogads = _ogads || [];
  _ogads.push(['lock', 'j7n7vn']);
</script>

<script src="https://ogads.com/assets/js/locker.js"></script>

<script>
  function showVideo() {
    document.getElementById("landing").style.display = "none";
    document.getElementById("videoSection").style.display = "block";
  }
</script>

</body>
</html>
